services:
  api:
    image: marquezproject/marquez:${MARQUEZ_VERSION}
    container_name: openlineage-marquez-api
    environment:
      MARQUEZ_PORT: ${MARQUEZ_API_PORT}
      MARQUEZ_ADMIN_PORT: ${MARQUEZ_ADMIN_PORT}
      POSTGRES_HOST: ${MARQUEZ_DB_HOST}
      POSTGRES_PORT: ${MARQUEZ_DB_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      MARQUEZ_CONFIG: /opt/marquez/marquez.yml
      SEARCH_ENABLED: ${SEARCH_ENABLED}
      LOG_LEVEL: ${LOG_LEVEL}
    expose:
      - "${MARQUEZ_API_PORT}"
      - "${MARQUEZ_ADMIN_PORT}"
    volumes:
      - ./marquez.yml:/opt/marquez/marquez.yml:ro
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  web:
    image: marquezproject/marquez-web:${MARQUEZ_VERSION}
    container_name: openlineage-marquez-web
    environment:
      MARQUEZ_HOST: api
      MARQUEZ_PORT: ${MARQUEZ_API_PORT}
      WEB_PORT: ${MARQUEZ_WEB_PORT}
      REACT_APP_ADVANCED_SEARCH: ${SEARCH_ENABLED}
    expose:
      - "${MARQUEZ_WEB_PORT}"
    depends_on:
      - api
    restart: unless-stopped

  gateway:
    image: nginx:1.29-alpine
    container_name: openlineage-gateway
    depends_on:
      - api
      - web
    ports:
      - "${OPENLINEAGE_BIND_IP}:${MARQUEZ_WEB_PORT}:${MARQUEZ_WEB_PORT}"
      - "${OPENLINEAGE_BIND_IP}:${MARQUEZ_API_PORT}:${MARQUEZ_API_PORT}"
      - "${OPENLINEAGE_BIND_IP}:${MARQUEZ_ADMIN_PORT}:${MARQUEZ_ADMIN_PORT}"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/.htpasswd:/etc/nginx/.htpasswd:ro
    restart: unless-stopped

  db:
    image: postgres:14
    container_name: openlineage-marquez-db
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ROOT_PASSWORD}
      PGDATA: /var/lib/postgresql/data/pgdata
      MARQUEZ_DB: ${POSTGRES_DB}
      MARQUEZ_USER: ${POSTGRES_USER}
      MARQUEZ_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./init-db.sh:/docker-entrypoint-initdb.d/01-init-db.sh:ro
      - ./data/postgres:/var/lib/postgresql/data
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U postgres -d postgres
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped
